<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Gateway</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: radial-gradient(circle at top right, #1e3a8a, #0f172a); color: white; overflow: hidden; }
        .glass { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .ios-input { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); color: white; outline: none; transition: 0.3s; }
        .ios-input:focus { background: rgba(255, 255, 255, 0.1); border-color: #3b82f6; }
        .btn-primary { background: linear-gradient(135deg, #3b82f6, #2563eb); }
        .hidden { display: none; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-6">

    <div id="login-card" class="w-full max-w-sm glass p-8 rounded-[2.5rem] shadow-2xl">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold italic text-blue-400">HM STREAM</h1>
            <p class="text-blue-300/60 text-sm mt-1">Login dengan Username atau Nama</p>
        </div>
        <div class="space-y-4">
            <input type="text" id="login-user" placeholder="Username / Nama" class="w-full ios-input p-4 rounded-2xl text-center">
            <input type="password" id="login-pass" placeholder="Password" class="w-full ios-input p-4 rounded-2xl text-center">
            <button onclick="prosesLogin()" id="btn-login" class="w-full btn-primary text-white font-semibold p-4 rounded-2xl active:scale-95 transition">Login</button>
            <button onclick="tampilDaftar()" class="w-full text-blue-400 text-sm mt-2">Daftar Akun Baru</button>
        </div>
    </div>

    <div id="register-card" class="hidden w-full max-w-sm glass p-8 rounded-[2.5rem]">
        <h1 class="text-2xl font-bold text-center mb-6">Pendaftaran</h1>
        <div class="space-y-4">
            <input type="text" id="reg-nama" placeholder="Nama Lengkap" class="w-full ios-input p-4 rounded-2xl">
            <input type="tel" id="reg-wa" placeholder="Nomor WhatsApp" class="w-full ios-input p-4 rounded-2xl">
            <button onclick="prosesDaftar()" id="btn-reg" class="w-full btn-primary text-white font-bold p-4 rounded-2xl active:scale-95 transition">Daftar</button>
            <button onclick="tampilLogin()" class="w-full text-gray-400 text-sm mt-1 text-center">Batal</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCn7NYAVJbt92qaOsMQ5vpHncXmBg2Kq7Q",
            authDomain: "qrs-auth-key.firebaseapp.com",
            databaseURL: "https://qrs-auth-key-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "qrs-auth-key",
            storageBucket: "qrs-auth-key.firebasestorage.app",
            messagingSenderId: "344177383382",
            appId: "1:344177383382:web:122fd5814183807d007677"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function tampilDaftar() { document.getElementById('login-card').classList.add('hidden'); document.getElementById('register-card').classList.remove('hidden'); }
        function tampilLogin() { document.getElementById('register-card').classList.add('hidden'); document.getElementById('login-card').classList.remove('hidden'); }

        function prosesDaftar() {
            const n = document.getElementById('reg-nama').value.trim();
            const w = document.getElementById('reg-wa').value.trim();
            if (n.length < 3) return alert("Nama tidak valid");
            const id = Math.floor(1000 + Math.random() * 9000);
            const uG = `hm-user-${id}`;
            const pG = `pass-${id}`;
            db.ref('users/' + uG).set({ username: uG, nama: n, wa: w, password: pG, saldo: 0 })
            .then(() => { alert(`SIMPAN DATA INI!\nID: ${uG}\nPW: ${pG}`); tampilLogin(); });
        }

        function prosesLogin() {
            const u = document.getElementById('login-user').value.trim();
            const p = document.getElementById('login-pass').value.trim();
            const btn = document.getElementById('btn-login');
            btn.disabled = true;

            // Cek Username
            db.ref('users/' + u).once('value').then((s) => {
                if (s.exists() && s.val().password === p) {
                    lanjutKeHome(s.val());
                } else {
                    // Cek berdasarkan Nama jika Username tidak ketemu
                    db.ref('users').orderByChild('nama').equalTo(u).once('value').then((snap) => {
                        btn.disabled = false;
                        if (snap.exists()) {
                            const data = Object.values(snap.val())[0];
                            if (data.password === p) lanjutKeHome(data);
                            else alert("Password Salah");
                        } else { alert("Akun tidak ditemukan"); }
                    });
                }
            });
        }

        function lanjutKeHome(data) { localStorage.setItem('hmUser', JSON.stringify(data)); window.location.href = 'base.html'; }
    </script>
</body>
</html>
