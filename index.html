<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HM STREAM | Access</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #020617; color: white; min-height: 100vh; overflow: hidden; }
        .bg-glow { background: radial-gradient(circle at 50% -20%, #1e40af, #020617); }
        .glass-card { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 2.5rem; }
        .ios-input { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1); transition: 0.3s; color: white; text-align: center; }
        .ios-input:focus { border-color: #3b82f6; background: rgba(255, 255, 255, 0.08); outline: none; }
        .btn-glow { background: linear-gradient(135deg, #3b82f6, #1d4ed8); box-shadow: 0 10px 25px -5px rgba(59, 130, 246, 0.4); }
    </style>
</head>
<body class="bg-glow flex items-center justify-center p-6">
    <div id="login-card" class="w-full max-w-sm glass-card p-10 shadow-2xl">
        <div class="text-center mb-10">
            <h1 class="text-3xl font-extrabold tracking-tighter text-blue-400 italic">HM STREAM</h1>
            <p class="text-slate-400 text-xs mt-2 uppercase tracking-widest">Gateway Access</p>
        </div>
        <div class="space-y-4">
            <input type="text" id="login-user" placeholder="Username" class="w-full ios-input p-4 rounded-2xl">
            <input type="password" id="login-pass" placeholder="Password" class="w-full ios-input p-4 rounded-2xl">
            <button onclick="prosesLogin()" id="btn-login" class="w-full btn-glow text-white font-bold p-4 rounded-2xl active:scale-95 transition mt-4">Login</button>
            <p class="text-center text-xs text-slate-500 mt-6">Belum punya akun? <button onclick="tampilDaftar()" class="text-blue-400 font-bold hover:underline">Daftar</button></p>
        </div>
    </div>

    <div id="register-card" class="hidden w-full max-w-sm glass-card p-10 shadow-2xl">
        <h2 class="text-xl font-bold mb-6 text-center text-blue-400">Pendaftaran Baru</h2>
        <div class="space-y-4">
            <input type="text" id="reg-nama" placeholder="Nama Lengkap" class="w-full ios-input p-4 rounded-2xl">
            <input type="tel" id="reg-wa" placeholder="Nomor WhatsApp" class="w-full ios-input p-4 rounded-2xl">
            <button onclick="prosesDaftar()" id="btn-reg" class="w-full btn-glow text-white font-bold p-4 rounded-2xl">Buat Akun</button>
            <button onclick="tampilLogin()" class="w-full text-slate-500 text-xs mt-2 uppercase">Batal</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCn7NYAVJbt92qaOsMQ5vpHncXmBg2Kq7Q",
            authDomain: "qrs-auth-key.firebaseapp.com",
            databaseURL: "https://qrs-auth-key-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "qrs-auth-key",
            storageBucket: "qrs-auth-key.firebasestorage.app",
            messagingSenderId: "344177383382",
            appId: "1:344177383382:web:122fd5814183807d007677"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function tampilDaftar() { document.getElementById('login-card').classList.add('hidden'); document.getElementById('register-card').classList.remove('hidden'); }
        function tampilLogin() { document.getElementById('register-card').classList.add('hidden'); document.getElementById('login-card').classList.remove('hidden'); }

        function prosesDaftar() {
            const n = document.getElementById('reg-nama').value.trim();
            const w = document.getElementById('reg-wa').value.trim();
            if (n.length < 3) return alert("Nama tidak valid");
            const id = Math.floor(1000 + Math.random() * 9000);
            const uG = `hm-user-${id}`, pG = `pass-${id}`;
            db.ref('users/' + uG).set({ username: uG, nama: n, wa: w, password: pG, saldo: 0 })
            .then(() => { alert(`SIMPAN CREDENTIALS INI!\nID: ${uG}\nPW: ${pG}`); tampilLogin(); });
        }

        function prosesLogin() {
            const u = document.getElementById('login-user').value.trim();
            const p = document.getElementById('login-pass').value.trim();
            db.ref('users/' + u).once('value').then((s) => {
                if (s.exists() && s.val().password === p) {
                    localStorage.setItem('hmUser', JSON.stringify(s.val()));
                    window.location.href = 'base.html';
                } else { alert("Data tidak sesuai"); }
            });
        }
    </script>
</body>
</html>
