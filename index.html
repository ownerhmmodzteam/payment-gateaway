<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HM STREAM | Gateway</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #020617; color: white; }
        .bg-gradient { background: radial-gradient(circle at 50% -20%, #1e40af, #020617); min-height: 100vh; }
        .glass-card { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 2rem; }
        .ios-input { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1); transition: 0.3s; }
        .ios-input:focus { border-color: #3b82f6; background: rgba(255, 255, 255, 0.08); outline: none; }
        .btn-glow { background: linear-gradient(135deg, #3b82f6, #1d4ed8); box-shadow: 0 10px 25px -5px rgba(59, 130, 246, 0.4); }
        .animate-in { animation: fadeInUp 0.6s ease-out; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-gradient flex items-center justify-center p-6">

    <div id="login-card" class="w-full max-w-sm glass-card p-10 animate-in">
        <div class="text-center mb-10">
            <h1 class="text-4xl font-extrabold tracking-tighter text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-indigo-500">HM STREAM</h1>
            <p class="text-slate-400 text-sm mt-2 font-medium">Elevate Your Streaming Experience</p>
        </div>
        
        <div class="space-y-5">
            <div class="space-y-2">
                <label class="text-xs font-semibold text-slate-400 ml-1">IDENTITAS</label>
                <input type="text" id="login-user" placeholder="Username atau Nama" class="w-full ios-input p-4 rounded-2xl">
            </div>
            <div class="space-y-2">
                <label class="text-xs font-semibold text-slate-400 ml-1">KATA SANDI</label>
                <input type="password" id="login-pass" placeholder="••••••••" class="w-full ios-input p-4 rounded-2xl">
            </div>
            <button onclick="prosesLogin()" id="btn-login" class="w-full btn-glow text-white font-bold p-4 rounded-2xl active:scale-95 transition-all mt-4">Sign In</button>
            <p class="text-center text-sm text-slate-500 mt-6">Belum punya akun? <button onclick="tampilDaftar()" class="text-blue-400 font-semibold hover:underline">Daftar</button></p>
        </div>
    </div>

    <div id="register-card" class="hidden w-full max-w-sm glass-card p-10 animate-in">
        <h2 class="text-2xl font-bold mb-6 text-center">Buat Akun</h2>
        <div class="space-y-4">
            <input type="text" id="reg-nama" placeholder="Nama Lengkap" class="w-full ios-input p-4 rounded-2xl">
            <input type="tel" id="reg-wa" placeholder="WhatsApp (62xxx)" class="w-full ios-input p-4 rounded-2xl">
            <button onclick="prosesDaftar()" id="btn-reg" class="w-full btn-glow text-white font-bold p-4 rounded-2xl active:scale-95 transition-all">Register</button>
            <button onclick="tampilLogin()" class="w-full text-slate-400 text-sm">Kembali ke Login</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCn7NYAVJbt92qaOsMQ5vpHncXmBg2Kq7Q",
            authDomain: "qrs-auth-key.firebaseapp.com",
            databaseURL: "https://qrs-auth-key-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "qrs-auth-key",
            storageBucket: "qrs-auth-key.firebasestorage.app",
            messagingSenderId: "344177383382",
            appId: "1:344177383382:web:122fd5814183807d007677"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function tampilDaftar() { document.getElementById('login-card').classList.add('hidden'); document.getElementById('register-card').classList.remove('hidden'); }
        function tampilLogin() { document.getElementById('register-card').classList.add('hidden'); document.getElementById('login-card').classList.remove('hidden'); }

        function prosesDaftar() {
            const n = document.getElementById('reg-nama').value.trim();
            const w = document.getElementById('reg-wa').value.trim();
            if (n.length < 3) return alert("Masukkan nama yang valid");
            const id = Math.floor(1000 + Math.random() * 9000);
            const uG = `hm-user-${id}`;
            const pG = `pass-${id}`;
            db.ref('users/' + uG).set({ username: uG, nama: n, wa: w, password: pG, saldo: 0 })
            .then(() => { alert(`SUKSES!\nID: ${uG}\nPW: ${pG}`); tampilLogin(); });
        }

        function prosesLogin() {
            const u = document.getElementById('login-user').value.trim();
            const p = document.getElementById('login-pass').value.trim();
            const btn = document.getElementById('btn-login');
            btn.disabled = true;

            db.ref('users/' + u).once('value').then((s) => {
                if (s.exists() && s.val().password === p) {
                    lanjut(s.val());
                } else {
                    db.ref('users').orderByChild('nama').equalTo(u).once('value').then((snap) => {
                        btn.disabled = false;
                        if (snap.exists()) {
                            const data = Object.values(snap.val())[0];
                            if (data.password === p) lanjut(data);
                            else alert("Password Salah");
                        } else { alert("User tidak ditemukan"); }
                    });
                }
            });
        }
        function lanjut(d) { localStorage.setItem('hmUser', JSON.stringify(d)); window.location.href = 'base.html'; }
    </script>
</body>
</html>
