<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: radial-gradient(circle at top right, #1e3a8a, #0f172a); color: white; min-height: 100vh; }
        .glass { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .ios-input { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); color: white; }
    </style>
</head>
<body class="p-6">

    <header class="flex justify-between items-center mb-8">
        <div>
            <p class="text-blue-300/60 text-xs">Dashboard</p>
            <h1 id="user-name" class="text-2xl font-bold">User</h1>
        </div>
        <div class="w-12 h-12 rounded-full bg-blue-600 flex items-center justify-center font-bold">HM</div>
    </header>

    <div class="glass p-8 rounded-[2.5rem] mb-6">
        <p class="text-sm text-blue-200/70">Total Saldo</p>
        <h2 id="user-saldo" class="text-4xl font-bold mt-1">Rp 0</h2>
        <div class="grid grid-cols-2 gap-4 mt-8">
            <button onclick="openModal('transfer')" class="bg-white text-blue-900 font-bold py-4 rounded-2xl">Kirim</button>
            <button onclick="openModal('qris')" class="bg-blue-500 text-white font-bold py-4 rounded-2xl">Minta</button>
        </div>
    </div>

    <div id="modal-transfer" class="hidden fixed inset-0 flex items-center justify-center bg-black/80 backdrop-blur-md z-50 p-6">
        <div class="w-full max-w-sm glass rounded-[2.5rem] p-8">
            <h3 class="text-xl font-bold mb-6">Transfer</h3>
            <div class="space-y-4">
                <input type="text" id="target-user" placeholder="Username / ID Tujuan" class="w-full ios-input p-4 rounded-2xl text-center">
                <input type="number" id="transfer-amount" placeholder="Nominal" class="w-full ios-input p-4 rounded-2xl text-center">
                <button onclick="prosesTransfer()" class="w-full bg-blue-500 p-4 rounded-2xl font-bold">Kirim</button>
                <button onclick="closeModal('transfer')" class="w-full text-gray-400 text-sm">Batal</button>
            </div>
        </div>
    </div>

    <div id="modal-qris" class="hidden fixed inset-0 flex items-center justify-center bg-black/80 backdrop-blur-md z-50 p-6">
        <div class="w-full max-w-sm glass rounded-[2.5rem] p-8 text-center">
            <h3 class="text-xl font-bold mb-6">Minta Bayar</h3>
            <div class="space-y-4">
                <input type="number" id="qris-amount" placeholder="Nominal" class="w-full ios-input p-4 rounded-2xl text-center">
                <button id="btn-qris" onclick="requestQRIS()" class="w-full bg-blue-500 p-4 rounded-2xl font-bold">Buat QRIS</button>
                <div id="qris-display" class="hidden pt-4">
                    <div class="bg-white p-3 rounded-2xl inline-block">
                        <img id="qris-img" src="" class="w-48 h-48">
                    </div>
                </div>
                <button onclick="closeModal('qris')" class="w-full text-gray-400 text-sm">Tutup</button>
            </div>
        </div>
    </div>

    <script>
        const user = JSON.parse(localStorage.getItem('hmUser'));
        if(!user) window.location.href = 'index.html';
        document.getElementById('user-name').innerText = user.nama;
        document.getElementById('user-saldo').innerText = "Rp " + (user.saldo || 0).toLocaleString();

        function openModal(t) { document.getElementById(`modal-${t}`).classList.remove('hidden'); }
        function closeModal(t) { document.getElementById(`modal-${t}`).classList.add('hidden'); }

        async function requestQRIS() {
            const amt = document.getElementById('qris-amount').value;
            const btn = document.getElementById('btn-qris');
            btn.innerText = "Loading...";
            try {
                const res = await fetch('http://localhost:3000/api/generate-qris', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ amount: amt })
                });
                const d = await res.json();
                if(d.success) {
                    document.getElementById('qris-img').src = d.qr_url;
                    document.getElementById('qris-display').classList.remove('hidden');
                }
            } catch (e) { alert("Error"); }
            btn.innerText = "Buat QRIS";
        }

        async function prosesTransfer() {
            alert("Fitur transfer berhasil dipicu!");
        }
    </script>
</body>
</html>
