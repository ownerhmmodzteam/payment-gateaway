<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | HM STREAM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #020617; color: white; min-height: 100vh; }
        .glass-panel { background: rgba(30, 41, 59, 0.4); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .card-wallet { background: linear-gradient(135deg, #1e40af, #3b82f6); box-shadow: 0 20px 40px -15px rgba(30, 64, 175, 0.5); }
        .ios-input { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); color: white; }
    </style>
</head>
<body class="pb-20">

    <header class="p-8 flex justify-between items-center">
        <div>
            <h1 class="text-xl font-bold italic tracking-tighter text-blue-400">HM STREAM</h1>
            <p id="user-display" class="text-slate-400 text-xs font-semibold mt-1 uppercase tracking-widest">Loading...</p>
        </div>
        <button onclick="localStorage.clear(); location.href='index.html'" class="w-10 h-10 glass-panel rounded-full flex items-center justify-center border border-white/10">👋</button>
    </header>

    <main class="px-6 space-y-6">
        <div class="card-wallet p-8 rounded-[2.5rem] relative overflow-hidden">
            <div class="absolute top-0 right-0 p-8 opacity-20 text-6xl">💎</div>
            <p class="text-blue-100/80 text-sm font-medium">Saldo Tersedia</p>
            <h2 id="user-saldo" class="text-4xl font-extrabold mt-2 tracking-tight">Rp 0</h2>
            
            <div class="flex gap-4 mt-10">
                <button onclick="openModal()" class="flex-1 bg-white/20 backdrop-blur-md text-white font-bold py-4 rounded-2xl border border-white/20 active:scale-95 transition">Top Up QRIS</button>
                <button class="flex-1 bg-white text-blue-900 font-bold py-4 rounded-2xl active:scale-95 transition">Kirim</button>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-4">
            <div class="glass-panel p-6 rounded-[2rem] text-center border border-white/5">
                <div class="text-3xl mb-2">🚀</div>
                <p class="text-xs font-bold text-slate-300">UPGRADE</p>
            </div>
            <div class="glass-panel p-6 rounded-[2rem] text-center border border-white/5">
                <div class="text-3xl mb-2">📊</div>
                <p class="text-xs font-bold text-slate-300">HISTORY</p>
            </div>
        </div>
    </main>

    <div id="modal-topup" class="hidden fixed inset-0 flex items-center justify-center bg-black/90 backdrop-blur-xl z-50 p-6">
        <div class="w-full max-w-sm glass-panel rounded-[3rem] p-10 text-center border border-white/10 animate-in">
            <div class="w-16 h-1 bg-slate-700 rounded-full mx-auto mb-8"></div>
            <h3 class="text-2xl font-extrabold mb-2">Generate QRIS</h3>
            <p class="text-slate-400 text-sm mb-8">Masukkan nominal deposit anda</p>
            
            <div class="space-y-6">
                <div class="relative">
                    <span class="absolute left-4 top-4 font-bold text-slate-500">Rp</span>
                    <input type="number" id="amount" placeholder="0" class="w-full ios-input p-4 pl-12 rounded-2xl text-xl font-bold outline-none">
                </div>
                
                <button id="btn-pay" onclick="requestQRIS()" class="w-full bg-blue-600 text-white font-bold p-5 rounded-2xl shadow-lg shadow-blue-600/30">Lanjutkan Pembayaran</button>
                
                <div id="qris-display" class="hidden flex flex-col items-center pt-6 space-y-4">
                    <div class="bg-white p-4 rounded-3xl shadow-2xl">
                        <img id="qris-img" src="" class="w-52 h-52">
                    </div>
                    <p class="text-[10px] text-blue-400 font-bold tracking-widest uppercase">Scan Menggunakan Aplikasi Bank/E-Wallet</p>
                </div>

                <button onclick="closeModal()" class="text-slate-500 text-sm font-semibold mt-4">Nanti Saja</button>
            </div>
        </div>
    </div>

    <script>
        const user = JSON.parse(localStorage.getItem('hmUser'));
        if(!user) window.location.href = 'index.html';
        document.getElementById('user-display').innerText = user.nama;
        document.getElementById('user-saldo').innerText = "Rp " + (user.saldo || 0).toLocaleString();

        function openModal() { document.getElementById('modal-topup').classList.remove('hidden'); }
        function closeModal() { 
            document.getElementById('modal-topup').classList.add('hidden');
            document.getElementById('qris-display').classList.add('hidden');
            document.getElementById('btn-pay').classList.remove('hidden');
        }

        async function requestQRIS() {
            const amt = document.getElementById('amount').value;
            const btn = document.getElementById('btn-pay');
            if(amt < 1000) return alert("Min. Rp 1.000");

            btn.innerText = "Memproses...";
            btn.disabled = true;

            try {
                // Menembak ke API Route Vercel (Lebih Aman & Tanpa Proxy Manual)
                const response = await fetch('/api/generate-qris', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ amount: amt })
                });

                const data = await response.json();

                if(data.success || data.status === 'success') {
                    document.getElementById('qris-img').src = data.qr_url || data.qr_image_url || data.data.qr_url;
                    document.getElementById('qris-display').classList.remove('hidden');
                    btn.classList.add('hidden');
                } else {
                    alert("Gagal mengambil QRIS. Cek Saldo API.");
                }
            } catch (err) {
                alert("Gangguan koneksi ke server.");
            } finally {
                btn.innerText = "Lanjutkan Pembayaran";
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
